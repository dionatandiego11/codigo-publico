# Código Público — ambiente local completo.
#   docker compose up -d                  → postgres + redis
#   docker compose --profile api up -d    → inclui a API Go
services:
  postgres:
    image: postgres:16-alpine
    container_name: codigo-publico-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codigo_publico}
      POSTGRES_USER: ${POSTGRES_USER:-codigo_publico}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codigo_publico}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - codigo_publico_postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codigo_publico} -d ${POSTGRES_DB:-codigo_publico}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codigo-publico-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - codigo_publico_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    profiles: ["api"]
    build:
      context: ./backend
      dockerfile: ../infra/docker/api.Dockerfile
    container_name: codigo-publico-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-codigo_publico}:${POSTGRES_PASSWORD:-codigo_publico}@postgres:5432/${POSTGRES_DB:-codigo_publico}?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      CPF_HASH_SECRET: ${CPF_HASH_SECRET:-dev-cpf-hash-secret-change-me}
      ANCHOR_MODE: ${ANCHOR_MODE:-log}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  codigo_publico_postgres_data:
  codigo_publico_redis_data:
