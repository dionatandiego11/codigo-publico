# Nginx de produção: serve o front-end estático e faz proxy da API Go.
# Instale em /etc/nginx/sites-available/codigo-publico e habilite com symlink.
server {
    listen 80;
    server_name codigopublico.example.gov.br;

    # Redireciona para HTTPS (certbot/Let's Encrypt preenche o bloco 443).
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name codigopublico.example.gov.br;

    # ssl_certificate     /etc/letsencrypt/live/.../fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/.../privkey.pem;

    # Segurança básica
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Front-end (SPA): build do Vite em frontend/dist
    root /var/www/codigo-publico;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API Go
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
